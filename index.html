<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>secOps // centro de estudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080B0C;
  --panel:#0E1416;
  --panel-2:#121A1D;
  --line:#1C2A2E;
  --line-2:#284047;
  --green:#3DF07A;
  --green-dim:#1E8F4A;
  --cyan:#2CD4E6;
  --amber:#F5B642;
  --red:#FF5C5C;
  --txt:#C7D6D4;
  --txt-dim:#6E8480;
  --txt-faint:#42534F;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.13) 0px,rgba(0,0,0,0.13) 1px,transparent 1px,transparent 3px);
  opacity:.35;
}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--green-dim);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:var(--green-dim)}

/* ===== layout ===== */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{
  background:var(--panel);border-right:1px solid var(--line);
  position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 0;
  display:flex;flex-direction:column;
}
.brand{padding:0 18px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
.brand .logo{font-family:var(--mono);font-size:13px;color:var(--green);font-weight:700;letter-spacing:.5px}
.brand .logo .blink{animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.brand .sub{font-family:var(--mono);font-size:10px;color:var(--txt-dim);margin-top:5px;letter-spacing:.5px}
.nav{flex:1;padding:0 10px}
.nav button{
  width:100%;text-align:left;background:none;border:none;color:var(--txt-dim);
  font-family:var(--mono);font-size:12.5px;padding:9px 10px;cursor:pointer;
  display:flex;align-items:center;gap:9px;border-radius:3px;transition:.15s;letter-spacing:.3px;
}
.nav button:hover{color:var(--txt);background:var(--panel-2)}
.nav button.active{color:var(--green);background:var(--panel-2);box-shadow:inset 2px 0 0 var(--green)}
.nav button .ix{color:var(--txt-faint);font-size:11px}
.nav button.active .ix{color:var(--green-dim)}
.side-foot{padding:14px 18px 4px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;color:var(--txt-faint);line-height:1.6}

.main{padding:0;max-width:100%;overflow-x:hidden}
.topbar{
  background:var(--bg);border-bottom:1px solid var(--line);
  padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;backdrop-filter:blur(6px);
}
.topbar .prompt{font-family:var(--mono);font-size:13px;color:var(--txt-dim)}
.topbar .prompt b{color:var(--green);font-weight:500}
.topbar .prompt .path{color:var(--cyan)}
.progress-mini{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;color:var(--txt-dim)}
.bar{width:120px;height:6px;background:var(--line);border-radius:0;overflow:hidden}
.bar i{display:block;height:100%;background:var(--green);width:0%;transition:width .4s}

.view{padding:32px;max-width:1000px;margin:0 auto;display:none;animation:fade .3s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h1{font-family:var(--mono);font-size:24px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-bottom:6px}
h1 .accent{color:var(--green)}
.lead{color:var(--txt-dim);font-size:14px;margin-bottom:28px;max-width:680px}
h2{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--green);margin:32px 0 14px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
h2::before{content:"##";color:var(--txt-faint);font-weight:400}
h3{font-family:var(--mono);font-size:13.5px;font-weight:500;color:var(--cyan);margin:20px 0 10px}
p{margin-bottom:12px}
strong{color:#fff;font-weight:600}
.eyebrow{font-family:var(--mono);font-size:11px;color:var(--green-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

/* ===== cards / panels ===== */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:20px;margin-bottom:16px}
.grid{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:repeat(3,1fr)}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:16px}
.stat .k{font-family:var(--mono);font-size:11px;color:var(--txt-dim);letter-spacing:.5px;text-transform:uppercase}
.stat .v{font-family:var(--mono);font-size:28px;color:var(--green);font-weight:700;margin-top:6px;line-height:1}
.stat .v small{font-size:13px;color:var(--txt-dim);font-weight:400}

.callout{border-left:2px solid var(--amber);background:rgba(245,182,66,.05);padding:14px 16px;border-radius:0 4px 4px 0;margin:16px 0;font-size:13.5px}
.callout.legal{border-color:var(--red);background:rgba(255,92,92,.05)}
.callout.tip{border-color:var(--cyan);background:rgba(44,212,230,.05)}
.callout .tag{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--amber);display:block;margin-bottom:4px}
.callout.legal .tag{color:var(--red)}
.callout.tip .tag{color:var(--cyan)}

/* ===== code ===== */
code{font-family:var(--mono);font-size:12.5px;background:var(--panel-2);color:var(--green);padding:2px 6px;border-radius:3px;border:1px solid var(--line)}
pre{background:#0A1012;border:1px solid var(--line);border-radius:4px;padding:14px 16px;overflow-x:auto;margin:12px 0;position:relative}
pre code{background:none;border:none;padding:0;color:var(--txt);font-size:12.5px;line-height:1.7;display:block;white-space:pre}
pre .cmt{color:var(--txt-faint)}
pre .cmd{color:var(--green)}
.copy{position:absolute;top:8px;right:8px;background:var(--panel-2);border:1px solid var(--line);color:var(--txt-dim);font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;opacity:0;transition:.15s}
pre:hover .copy{opacity:1}
.copy:hover{color:var(--green);border-color:var(--green-dim)}
.copy.done{color:var(--green)}

/* ===== weeks ===== */
.week{background:var(--panel);border:1px solid var(--line);border-radius:4px;margin-bottom:12px;overflow:hidden}
.week-head{padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:.15s}
.week-head:hover{background:var(--panel-2)}
.week-num{font-family:var(--mono);font-size:11px;color:var(--bg);background:var(--green-dim);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-weight:700;flex-shrink:0}
.week.done .week-num{background:var(--green)}
.week-meta{flex:1;min-width:0}
.week-meta .t{font-family:var(--mono);font-size:14px;color:#fff;font-weight:500}
.week-meta .g{font-size:12px;color:var(--txt-dim);margin-top:2px}
.week-prog{font-family:var(--mono);font-size:11px;color:var(--txt-dim);flex-shrink:0}
.week-chev{color:var(--txt-faint);transition:.2s;flex-shrink:0;font-family:var(--mono)}
.week.open .week-chev{transform:rotate(90deg);color:var(--green)}
.week-body{display:none;border-top:1px solid var(--line);padding:6px 18px 14px}
.week.open .week-body{display:block}
.day{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.day:last-child{border-bottom:none}
.day-check{flex-shrink:0;margin-top:2px}
.day-check input{appearance:none;width:18px;height:18px;border:1px solid var(--line-2);border-radius:3px;cursor:pointer;position:relative;background:var(--bg);transition:.15s}
.day-check input:checked{background:var(--green-dim);border-color:var(--green)}
.day-check input:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px}
.day-content{flex:1}
.day-label{font-family:var(--mono);font-size:11px;color:var(--green-dim);letter-spacing:.5px}
.day-title{font-size:13.5px;color:var(--txt);font-weight:500;margin:1px 0 3px}
.day.checked .day-title{color:var(--txt-dim);text-decoration:line-through}
.day-desc{font-size:12.5px;color:var(--txt-dim)}
.day-tags{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px;border:1px solid var(--line-2);color:var(--txt-dim)}
.pill.clickable{cursor:pointer;transition:.15s}
.pill.clickable:hover{background:var(--panel-2);color:#fff;border-color:var(--green-dim);transform:translateY(-1px)}
.pill.read{color:var(--cyan);border-color:rgba(44,212,230,.3)}
.pill.lab{color:var(--green);border-color:var(--green-dim)}
.pill.ctf{color:var(--amber);border-color:rgba(245,182,66,.3)}

/* ===== arsenal table ===== */
.tool{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:16px 18px;margin-bottom:10px}
.tool-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.tool-name{font-family:var(--mono);font-size:14px;color:var(--green);font-weight:700}
.tool-cat{font-family:var(--mono);font-size:10px;color:var(--txt-faint);letter-spacing:.5px;text-transform:uppercase}
.tool-desc{font-size:13px;color:var(--txt-dim);margin-bottom:8px}

/* ===== timeline (daily routine) ===== */
.routine{display:flex;flex-direction:column;gap:0}
.slot{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--line)}
.slot:last-child{border-bottom:none}
.slot-time{font-family:var(--mono);font-size:11px;color:var(--green);width:90px;flex-shrink:0;padding-top:2px}
.slot-body .st{font-size:13.5px;color:var(--txt);font-weight:500}
.slot-body .sd{font-size:12.5px;color:var(--txt-dim)}

.cat-head{font-family:var(--mono);font-size:11px;color:var(--green-dim);letter-spacing:1px;text-transform:uppercase;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

.reset-btn{background:none;border:1px solid var(--line-2);color:var(--txt-dim);font-family:var(--mono);font-size:11px;padding:7px 14px;border-radius:3px;cursor:pointer;transition:.15s}
.reset-btn:hover{color:var(--red);border-color:var(--red)}

.boot{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;color:var(--green);transition:opacity .5s}
.boot.gone{opacity:0;pointer-events:none}
.boot-inner{width:90%;max-width:480px}
.boot-line{opacity:0;margin-bottom:4px}
.boot-line.show{opacity:1}
.boot-line .ok{color:var(--green)}
.boot-line .dim{color:var(--txt-dim)}

@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-240px;width:240px;z-index:200;transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .sidebar.show{left:0}
  .menu-btn{display:flex!important}
  .view{padding:20px 16px}
  .topbar{padding:12px 16px}
  .topbar .prompt{font-size:11px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .progress-mini .bar{width:80px}
  h1{font-size:20px}
}
.menu-btn{display:none;background:none;border:1px solid var(--line-2);color:var(--green);font-family:var(--mono);font-size:16px;width:34px;height:34px;border-radius:3px;cursor:pointer;align-items:center;justify-content:center}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
.overlay.show{display:block}
</style>
</head>
<body>

<!-- boot sequence -->
<div class="boot" id="boot">
  <div class="boot-inner" id="bootInner"></div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="app">
  <!-- sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">secOps<span class="blink">_</span></div>
      <div class="sub">daniel // ruta de 8 semanas</div>
    </div>
    <nav class="nav" id="nav">
      <button class="active" data-view="dashboard"><span class="ix">01</span> dashboard</button>
      <button data-view="plan"><span class="ix">02</span> plan_estudio</button>
      <button data-view="lab"><span class="ix">03</span> laboratorio</button>
      <button data-view="osint"><span class="ix">04</span> osint</button>
      <button data-view="arsenal"><span class="ix">05</span> arsenal</button>
      <button data-view="recursos"><span class="ix">06</span> recursos</button>
    </nav>
    <div class="side-foot">
      progreso guardado<br>en este dispositivo<br>
      <span style="color:var(--green-dim)">●</span> sistema activo
    </div>
  </aside>

  <!-- main -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="menu-btn" onclick="toggleMenu()">≡</button>
        <div class="prompt"><b>root@daniel</b>:<span class="path">~/ciberseguridad</span># <span id="promptTail">cat plan.md</span></div>
      </div>
      <div class="progress-mini">
        <span id="progTxt">0%</span>
        <div class="bar"><i id="progBar"></i></div>
      </div>
    </div>

    <!-- VIEWS get injected here -->
    <div id="views"></div>
  </div>
</div>

<script>
/* ============ CURRICULUM DATA ============ */
const WEEKS = [
{
  n:1, t:"Fundamentos: Linux + Laboratorio",
  g:"Dominar la terminal y montar tu campo de prácticas.",
  days:[
    {l:"Día 1 — Setup",ti:"Montar el laboratorio",d:"Instala virt-manager/KVM, crea tu primer snapshot. Lee la sección Laboratorio completa antes de tocar nada.",tags:["lab"]},
    {l:"Día 2 — Filesystem",ti:"Sistema de archivos y permisos",d:"Jerarquía de Linux (/etc, /var, /home), rutas absolutas vs relativas, chmod y chown. Practica creando y moviendo archivos.",tags:["read","lab"]},
    {l:"Día 3 — Terminal",ti:"Pipes, redirección y filtros",d:"Aprende | (pipe), > y >> (redirección), grep, find, awk básico. Encadena comandos para resolver tareas reales.",tags:["read","lab"]},
    {l:"Día 4 — Bash",ti:"Tu primer script",d:"Variables, condicionales (if), bucles (for). Escribe un script que automatice algo simple (ej. listar puertos abiertos).",tags:["read","lab"]},
    {l:"Día 5 — Sistema",ti:"Procesos, usuarios y servicios",d:"ps, top, systemctl, sudo, gestión de usuarios. Entiende qué corre en tu máquina y cómo controlarlo.",tags:["read","lab"]},
    {l:"Día 6 — Práctica",ti:"OverTheWire: Bandit (niveles 0-12)",d:"El mejor wargame para fijar la terminal. Cada nivel es un puzzle que se resuelve con comandos. Empieza aquí: overthewire.org/wargames/bandit",tags:["ctf"]},
    {l:"Día 7 — Repaso",ti:"Consolidar semana 1",d:"Repasa tus notas, repite los comandos que olvidaste, completa Bandit hasta donde llegaste. Sin esta base, nada de lo demás funciona.",tags:["read"]}
  ]
},
{
  n:2, t:"Redes desde cero",
  g:"Entender cómo viaja la información antes de interceptarla.",
  days:[
    {l:"Día 1 — Teoría",ti:"Modelo TCP/IP, IPs y puertos",d:"Qué es una dirección IP, qué es un puerto, los protocolos clave (TCP, UDP, HTTP, DNS). La base conceptual de todo lo demás.",tags:["read"]},
    {l:"Día 2 — Comandos",ti:"Herramientas de red en Linux",d:"ip a, ss -tulpn, ping, traceroute, dig. Diagnostica tu propia red — esto es exactamente tu trabajo de OSS.",tags:["read","lab"]},
    {l:"Día 3 — tcpdump",ti:"Captura de tráfico en terminal",d:"Captura paquetes en vivo, filtra por puerto y host, guarda en .pcap. Ligero y perfecto para servidores sin GUI.",tags:["read","lab"]},
    {l:"Día 4 — Wireshark",ti:"Análisis visual de paquetes",d:"Abre tus capturas, usa filtros (http, ip.addr), 'Follow TCP Stream'. Mira una petición real byte por byte.",tags:["read","lab"]},
    {l:"Día 5 — HTTP vs HTTPS",ti:"Por qué existe el cifrado",d:"Captura tráfico HTTP (texto plano) y HTTPS (cifrado) y compáralos. Una de las lecciones más reveladoras del curso.",tags:["lab"]},
    {l:"Día 6 — Práctica",ti:"Analiza tu propio tráfico",d:"Navega normalmente mientras capturas. Identifica qué protocolos usas, a qué servidores te conectas, qué se ve y qué no.",tags:["lab"]},
    {l:"Día 7 — Repaso",ti:"TryHackMe: Network Fundamentals",d:"Refuerza con la ruta 'Pre Security' de TryHackMe — salas guiadas y gratuitas sobre redes.",tags:["ctf"]}
  ]
},
{
  n:3, t:"Reconocimiento",
  g:"Recolectar información de un objetivo: la primera fase real de un pentest.",
  days:[
    {l:"Día 1 — OSINT",ti:"Reconocimiento pasivo",d:"whois, dig, búsqueda en fuentes públicas. Información que se obtiene sin tocar el objetivo — legal y silenciosa.",tags:["read","lab"]},
    {l:"Día 2 — amass",ti:"Enumeración de subdominios",d:"Descubre la superficie de ataque oculta de un dominio (vpn., dev., mail.) combinando fuentes pasivas.",tags:["read","lab"]},
    {l:"Día 3 — nmap I",ti:"Descubrimiento y escaneo básico",d:"nmap -sn (qué hosts viven), escaneo de puertos comunes. La herramienta más icónica de la ciberseguridad.",tags:["read","lab"]},
    {l:"Día 4 — nmap II",ti:"Detección de versiones y scripts",d:"-sV (versiones), -A (agresivo), scripts NSE. Saca toda la información posible de un objetivo.",tags:["read","lab"]},
    {l:"Día 5 — Objetivo",ti:"Montar Metasploitable2",d:"Levanta tu primera máquina vulnerable de práctica y escanéala completa con nmap. Documenta cada puerto abierto.",tags:["lab"]},
    {l:"Día 6 — Práctica",ti:"Recon completo de tu lab",d:"Mapea toda tu red de laboratorio como si fuera un objetivo real. Crea un informe de hallazgos en tu bitácora.",tags:["lab"]},
    {l:"Día 7 — Repaso",ti:"TryHackMe: sala de Nmap",d:"La sala 'Nmap' de TryHackMe consolida todo con ejercicios prácticos calificados.",tags:["ctf"]}
  ]
},
{
  n:4, t:"Pentesting Web",
  g:"Auditar aplicaciones web — donde está la mayoría de las vulnerabilidades reales.",
  days:[
    {l:"Día 1 — Teoría",ti:"Cómo funciona la web",d:"Request/response, métodos (GET, POST), códigos de estado, cookies y sesiones. Entiende el modelo antes de romperlo.",tags:["read"]},
    {l:"Día 2 — DVWA + gobuster",ti:"Descubrir contenido oculto",d:"Monta DVWA en Docker. Usa gobuster para encontrar rutas y archivos no enlazados con un diccionario.",tags:["read","lab"]},
    {l:"Día 3 — nikto",ti:"Escaneo de vulnerabilidades web",d:"Pasa nikto contra DVWA. Identifica configuraciones erróneas, software viejo y archivos peligrosos.",tags:["read","lab"]},
    {l:"Día 4 — Burp I",ti:"Configurar el proxy interceptor",d:"Instala el certificado CA de Burp, configura el navegador, intercepta tu primera petición HTTPS.",tags:["read","lab"]},
    {l:"Día 5 — Burp II",ti:"Repeater e Intruder",d:"Modifica y repite peticiones (Repeater), automatiza fuerza bruta sobre un login (Intruder) en DVWA.",tags:["lab"]},
    {l:"Día 6 — OWASP",ti:"Top 10 + DVWA nivel low",d:"Conoce el OWASP Top 10 (las vulnerabilidades web más comunes) y explota las de DVWA en dificultad baja.",tags:["read","lab"]},
    {l:"Día 7 — Repaso",ti:"TryHackMe: OWASP Top 10",d:"La sala 'OWASP Top 10' te hace explotar cada categoría de forma guiada.",tags:["ctf"]}
  ]
},
{
  n:5, t:"Explotación",
  g:"De encontrar la vulnerabilidad a demostrar que se puede explotar.",
  days:[
    {l:"Día 1 — Conceptos",ti:"Exploit, payload, reverse shell",d:"Qué es un CVE, un exploit, un payload, y por qué una reverse shell evade firewalls. Vocabulario esencial.",tags:["read"]},
    {l:"Día 2 — Metasploit I",ti:"msfconsole: search y use",d:"Navega el framework, busca exploits por nombre/CVE, entiende la estructura de módulos.",tags:["read","lab"]},
    {l:"Día 3 — Metasploit II",ti:"Tu primer shell",d:"Explota Metasploitable2 con Metasploit y obtén tu primera sesión meterpreter. Momento clave del curso.",tags:["lab"]},
    {l:"Día 4 — Post-explotación",ti:"Meterpreter básico",d:"Una vez dentro: navegar archivos, capturar info del sistema, entender qué se puede hacer con acceso.",tags:["read","lab"]},

/* ============ STORAGE (graceful fallback) ============ */
const mem = {};
function store(k,v){ try{localStorage.setItem(k,v)}catch(e){mem[k]=v} }
function recall(k){ try{const x=localStorage.getItem(k);return x===null?(mem[k]??null):x}catch(e){return mem[k]??null} }

/* ============ helpers ============ */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function code(raw){
  // lines starting with # become comments, $ lines are commands
  const html = raw.split('\n').map(line=>{
    if(line.trim().startsWith('#')) return '<span class="cmt">'+esc(line)+'</span>';
    return esc(line);
  }).join('\n');
  return '<pre><button class="copy" onclick="cp(this)">copy</button><code>'+html+'</code></pre>';
}
function cp(btn){
  const t = btn.parentElement.querySelector('code').innerText;
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='copiado ✓';btn.classList.add('done');setTimeout(()=>{btn.textContent='copy';btn.classList.remove('done')},1400)});
}

  if (typeof sendPrompt === 'function') sendPrompt(msg);
  else alert('Esta función solo funciona dentro del chat de Claude. Abre esta herramienta desde una conversación activa.');
}

      <p>Más desafiante, menos guiado. Su sección "Starting Point" es buena cuando ya tengas las bases. → <a href="https://hackthebox.com" target="_blank">hackthebox.com</a></p>

      <p>Casos forenses estandarizados para la semana 7. → <a href="https://cfreds.nist.gov" target="_blank">cfreds.nist.gov</a></p>

    <h2>referencia rápida</h2>
    <div class="panel">

      <p><strong>GTFOBins</strong> — técnicas de escalada de privilegios en Linux. → <a href="https://gtfobins.github.io" target="_blank">gtfobins.github.io</a></p>

/* ============ VIEW: OSINT ============ */
function viewOsint(){

    <div class="callout legal"><span class="tag">ética — el límite del OSINT</span>Que la información sea pública no significa que todo uso sea legal o correcto. OSINT se usa para auditorías autorizadas, investigación y proteger tu propia huella digital — <strong>nunca</strong> para acosar, perfilar o vigilar a personas sin consentimiento. En Chile, recopilar y tratar datos personales tiene límites legales (Ley 19.628 y la nueva Ley 21.719 de protección de datos). Practica sobre ti mismo, sobre dominios propios o en retos diseñados para eso.</div>

    <h2>el ciclo osint</h2>
    <div class="panel">
      <div class="routine">
        <div class="slot"><div class="slot-time">01 · Definir</div><div class="slot-body"><div class="st">Qué buscas y por qué</div><div class="sd">Un objetivo claro evita perderte en horas de datos irrelevantes. ¿Dominio? ¿Persona? ¿Empresa? ¿Tu propia exposición?</div></div></div>
        <div class="slot"><div class="slot-time">02 · Recolectar</div><div class="slot-body"><div class="st">Reunir datos de fuentes abiertas</div><div class="sd">Buscadores, dorks, registros, redes sociales, metadatos, filtraciones. Guarda todo de forma ordenada.</div></div></div>
        <div class="slot"><div class="slot-time">03 · Procesar</div><div class="slot-body"><div class="st">Filtrar y correlacionar</div><div class="sd">Conecta los puntos: un correo lleva a un usuario, un usuario a un perfil, un perfil a una ubicación.</div></div></div>
        <div class="slot"><div class="slot-time">04 · Analizar</div><div class="slot-body"><div class="st">Convertir datos en inteligencia</div><div class="sd">¿Qué te dice todo esto? Identifica la superficie de ataque o la huella expuesta.</div></div></div>
        <div class="slot"><div class="slot-time">05 · Documentar</div><div class="slot-body"><div class="st">Informe reproducible</div><div class="sd">Registra fuentes y hallazgos. Un buen informe OSINT se puede verificar paso a paso.</div></div></div>

    </div>

    <div class="cat-head">técnica 01 · google dorking</div>
    <p>El "dorking" usa operadores avanzados de búsqueda para encontrar información que los buscadores indexaron pero que no es obvia: archivos expuestos, paneles de login, documentos con metadatos. Es la técnica OSINT más accesible y no requiere instalar nada.</p>
    ${code(`site:ejemplo.com            # solo resultados de ese dominio
filetype:pdf site:ejemplo.com  # documentos PDF en ese dominio
intitle:"index of"          # listados de directorios abiertos
inurl:admin                 # URLs que contengan "admin"

    <div class="callout tip"><span class="tag">recurso</span>La <a href="https://www.exploit-db.com/google-hacking-database" target="_blank">Google Hacking Database (GHDB)</a> tiene miles de dorks ya armados por categoría. Úsala solo sobre dominios que tengas autorización de auditar.</div>

const VIEWS = {dashboard:viewDashboard, plan:viewPlan, lab:viewLab, osint:viewOsint, arsenal:viewArsenal, recursos:viewRecursos};

function render(){
  document.getElementById('views').innerHTML = Object.keys(VIEWS).map(k=>VIEWS[k]()).join('');
  restoreChecks();
  updateProgress();
}
function go(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('v-'+view).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  document.getElementById('promptTail').textContent = PROMPTS[view];
  window.scrollTo(0,0);
  if(window.innerWidth<=820) closeMenu();
}
document.getElementById('nav').addEventListener('click',e=>{
  const btn=e.target.closest('button'); if(btn) go(btn.dataset.view);
});

/* ----- weeks ----- */
function toggleWeek(n){ document.getElementById('week-'+n).classList.toggle('open'); }
function openWeek(n){
  const w=document.getElementById('week-'+n);
  if(w && !w.classList.contains('open')) w.classList.add('open');
  w.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ----- progress ----- */
function onCheck(wn,di){
  const chk=document.getElementById('chk-'+wn+'-'+di);
  store('chk-'+wn+'-'+di, chk.checked?'1':'0');
  document.getElementById('day-'+wn+'-'+di).classList.toggle('checked',chk.checked);
  updateProgress();
}
function restoreChecks(){
  WEEKS.forEach(w=>w.days.forEach((d,i)=>{
    if(recall('chk-'+w.n+'-'+i)==='1'){
      const chk=document.getElementById('chk-'+w.n+'-'+i);
      if(chk){chk.checked=true;document.getElementById('day-'+w.n+'-'+i).classList.add('checked');}
    }
  }));
}
function updateProgress(){
  let done=0,total=0,curWeek=1,firstIncomplete=true;
  WEEKS.forEach(w=>{
    let wdone=0;
    w.days.forEach((d,i)=>{ total++; if(recall('chk-'+w.n+'-'+i)==='1'){done++;wdone++;} });
    const wp=document.getElementById('wprog-'+w.n);
    if(wp) wp.textContent=wdone+'/'+w.days.length;
    const wEl=document.getElementById('week-'+w.n);
    if(wEl) wEl.classList.toggle('done',wdone===w.days.length);
    if(wdone<w.days.length && firstIncomplete){curWeek=w.n;firstIncomplete=false;}
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progTxt').textContent=pct+'%';
  const dp=document.getElementById('dashPct'); if(dp) dp.innerHTML=pct+'<small>%</small>';
  const dd=document.getElementById('dashDone'); if(dd) dd.innerHTML=done+'<small>/'+total+'</small>';
  const dw=document.getElementById('dashWeek'); if(dw) dw.innerHTML=curWeek+'<small>/8</small>';
}
function resetProgress(){
  if(!confirm('¿Reiniciar todo tu progreso? Esto desmarca todos los días completados.')) return;
  WEEKS.forEach(w=>w.days.forEach((d,i)=>store('chk-'+w.n+'-'+i,'0')));
  document.querySelectorAll('.day input').forEach(c=>c.checked=false);
  document.querySelectorAll('.day').forEach(d=>d.classList.remove('checked'));
  updateProgress();
}

];
function runBoot(){
  const inner=document.getElementById('bootInner');

  const iv=setInterval(()=>{
